<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Review Hub</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --bg-primary: #0a0e17;
      --bg-card: rgba(15, 23, 42, 0.8);
      --bg-card-hover: rgba(20, 30, 55, 0.9);
      --border: rgba(56, 189, 248, 0.15);
      --border-glow: rgba(56, 189, 248, 0.3);
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent: #38bdf8;
      --accent-glow: rgba(56, 189, 248, 0.2);
      --success: #34d399;
      --warning: #fbbf24;
      --danger: #f87171;
      --running: #818cf8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 0%, rgba(56,189,248,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 100%, rgba(129,140,248,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* 头部 */
    .header {
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(20px) saturate(1.4);
      background: rgba(10, 14, 23, 0.85);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 {
      font-size: 20px; font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #818cf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      display: flex; align-items: center; gap: 10px;
    }
    .header h1::before { content: '⚡'; -webkit-text-fill-color: initial; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
      animation: pulse 2s infinite;
    }
    .status-dot.offline { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .conn-label { font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }

    /* 统计卡片 */
    .stats {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
      padding: 24px 32px 0;
      position: relative; z-index: 1;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
    }
    .stat-card:hover { border-color: var(--border-glow); background: var(--bg-card-hover); }
    .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
    .stat-value { font-size: 32px; font-weight: 700; margin-top: 6px; }
    .stat-value.running { color: var(--running); }
    .stat-value.completed { color: var(--success); }
    .stat-value.failed { color: var(--danger); }

    /* 主区域 */
    .main { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px 32px 32px; position: relative; z-index: 1; }

    /* 任务列表 */
    .panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      display: flex; flex-direction: column;
      max-height: 70vh;
    }
    .panel-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-weight: 600; font-size: 15px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-body { overflow-y: auto; flex: 1; padding: 8px; }

    /* 任务行 */
    .task-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-radius: 8px;
      cursor: pointer; transition: all 0.2s;
      border: 1px solid transparent;
    }
    .task-row:hover { background: rgba(56, 189, 248, 0.05); border-color: var(--border); }
    .task-row.active { background: rgba(56, 189, 248, 0.1); border-color: var(--accent); }
    .task-id { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; font-weight: 600; flex: 1; }
    .task-cli { font-size: 11px; color: var(--text-muted); background: rgba(100,116,139,0.2); padding: 2px 8px; border-radius: 4px; }

    /* 状态徽章 */
    .badge {
      font-size: 11px; font-weight: 600; padding: 3px 10px;
      border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .badge.queued { background: rgba(251,191,36,0.15); color: var(--warning); }
    .badge.starting { background: rgba(129,140,248,0.15); color: var(--running); }
    .badge.running { background: rgba(129,140,248,0.2); color: var(--running); animation: glow 2s infinite; }
    .badge.completed { background: rgba(52,211,153,0.15); color: var(--success); }
    .badge.failed { background: rgba(248,113,113,0.15); color: var(--danger); }
    .badge.cancelled { background: rgba(100,116,139,0.2); color: var(--text-muted); }
    .badge.timeout { background: rgba(251,191,36,0.2); color: var(--warning); }
    @keyframes glow { 0%,100% { box-shadow: 0 0 4px rgba(129,140,248,0.3); } 50% { box-shadow: 0 0 12px rgba(129,140,248,0.5); } }

    /* 详情面板 */
    .detail-empty { display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 14px; min-height: 300px; }
    .detail-meta { padding: 16px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-bottom: 1px solid var(--border); }
    .meta-item { font-size: 13px; }
    .meta-label { color: var(--text-muted); font-size: 11px; display: block; margin-bottom: 2px; }
    .detail-tabs { display: flex; border-bottom: 1px solid var(--border); }
    .tab-btn {
      padding: 10px 20px; font-size: 13px; cursor: pointer;
      background: none; border: none; color: var(--text-secondary);
      border-bottom: 2px solid transparent; transition: all 0.2s;
    }
    .tab-btn:hover { color: var(--text-primary); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .detail-content {
      flex: 1; overflow-y: auto; padding: 16px 20px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 13px; line-height: 1.6;
      white-space: pre-wrap; word-break: break-all;
      color: var(--text-secondary);
    }
    .detail-content .output-line { margin: 0; padding: 2px 0; }
    .cancel-btn {
      padding: 6px 16px; font-size: 12px; font-weight: 600;
      background: rgba(248,113,113,0.15); color: var(--danger);
      border: 1px solid rgba(248,113,113,0.3); border-radius: 6px;
      cursor: pointer; transition: all 0.2s;
    }
    .cancel-btn:hover { background: rgba(248,113,113,0.25); }

    /* 空状态 */
    .empty { text-align: center; padding: 40px; color: var(--text-muted); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }

    /* 滚动条 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(100,116,139,0.3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(100,116,139,0.5); }

    @media (max-width: 768px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .main { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>AI Review Hub</h1>
    <div class="header-right">
      <span class="conn-label"><span class="status-dot" id="wsStatus"></span> <span id="wsLabel">连接中...</span></span>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="stat-label">总任务</div><div class="stat-value" id="statTotal">0</div></div>
    <div class="stat-card"><div class="stat-label">运行中</div><div class="stat-value running" id="statRunning">0</div></div>
    <div class="stat-card"><div class="stat-label">已完成</div><div class="stat-value completed" id="statCompleted">0</div></div>
    <div class="stat-card"><div class="stat-label">失败</div><div class="stat-value failed" id="statFailed">0</div></div>
  </div>

  <div class="main">
    <!-- 任务列表 -->
    <div class="panel">
      <div class="panel-header">
        <span>📋 任务列表</span>
        <span id="taskCount" style="font-size:12px;color:var(--text-muted)"></span>
      </div>
      <div class="panel-body" id="taskList">
        <div class="empty"><div class="empty-icon">📭</div>暂无任务</div>
      </div>
    </div>

    <!-- 任务详情 -->
    <div class="panel">
      <div class="panel-header">
        <span>🔍 任务详情</span>
        <button class="cancel-btn" id="cancelBtn" style="display:none" onclick="cancelTask()">取消任务</button>
      </div>
      <div id="detailPanel">
        <div class="detail-empty">选择左侧任务查看详情</div>
      </div>
    </div>
  </div>

  <script>
    const API = '';
    let tasks = [];
    let selectedId = null;
    let logCursors = {};

    /** 状态中文映射 */
    const STATUS_LABELS = {
      queued: '排队中', starting: '启动中', running: '运行中',
      completed: '已完成', failed: '失败', cancelled: '已取消',
      timeout: '超时', cancel_requested: '取消中',
    };
    function statusLabel(s) { return STATUS_LABELS[s] || s; }

    // ============ WebSocket ============
    const socket = io();

    socket.on('connect', () => {
      document.getElementById('wsStatus').className = 'status-dot';
      document.getElementById('wsLabel').textContent = '已连接';
    });
    socket.on('disconnect', () => {
      document.getElementById('wsStatus').className = 'status-dot offline';
      document.getElementById('wsLabel').textContent = '断开';
    });

    /** 初始同步全量任务 */
    socket.on('tasks:sync', (data) => {
      tasks = data.tasks || [];
      renderAll();
    });

    /** 实时状态更新 */
    socket.on('task:status', (data) => {
      const idx = tasks.findIndex(t => t.id === data.taskId);
      if (idx >= 0) {
        Object.assign(tasks[idx], { status: data.status });
        if (data.task) {
          tasks[idx].started_at = data.task.started_at;
          tasks[idx].completed_at = data.task.completed_at;
          tasks[idx].output_lines = data.task.output_lines;
        }
      } else {
        tasks.unshift({ id: data.taskId, cli: data.task?.cli || '?', status: data.status, ...data.task });
      }
      renderAll();
      if (selectedId === data.taskId) loadDetail(data.taskId);
    });

    /** 实时输出 */
    socket.on('task:output', (data) => {
      if (selectedId === data.taskId) {
        const content = document.getElementById('logContent');
        if (content) {
          content.textContent += data.data;
          content.scrollTop = content.scrollHeight;
        }
      }
      // 更新 output_lines
      const t = tasks.find(t => t.id === data.taskId);
      if (t) t.output_lines = (t.output_lines || 0) + 1;
    });

    // ============ 渲染 ============
    function renderAll() {
      renderStats();
      renderList();
    }

    function renderStats() {
      const total = tasks.length;
      const running = tasks.filter(t => ['running','starting','queued'].includes(t.status)).length;
      const completed = tasks.filter(t => t.status === 'completed').length;
      const failed = tasks.filter(t => ['failed','timeout'].includes(t.status)).length;
      document.getElementById('statTotal').textContent = total;
      document.getElementById('statRunning').textContent = running;
      document.getElementById('statCompleted').textContent = completed;
      document.getElementById('statFailed').textContent = failed;
      document.getElementById('taskCount').textContent = `${total} 条`;
    }

    function renderList() {
      const el = document.getElementById('taskList');
      if (tasks.length === 0) {
        el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>暂无任务</div>';
        return;
      }
      el.innerHTML = tasks.map(t => `
        <div class="task-row ${t.id === selectedId ? 'active' : ''}" data-id="${escapeHtml(t.id)}">
          <span class="task-id">${escapeHtml(t.id)}</span>
          <span class="task-cli">${escapeHtml(t.cli || '?')}</span>
          <span class="badge ${escapeHtml(t.status)}">${statusLabel(t.status)}</span>
        </div>
      `).join('');
      // 事件委托
      el.querySelectorAll('.task-row').forEach(row => {
        row.addEventListener('click', () => selectTask(row.dataset.id));
      });
    }

    function selectTask(id) {
      selectedId = id;
      renderList();
      loadDetail(id);
    }

    /** 耗时实时更新定时器 */
    let elapsedTimer = null;

    async function loadDetail(id) {
      try {
        // 清理上一个任务的耗时定时器
        if (elapsedTimer) { clearInterval(elapsedTimer); elapsedTimer = null; }

        const res = await fetch(`${API}/tasks/${id}`);
        const data = await res.json();
        const panel = document.getElementById('detailPanel');
        const isActive = ['running','starting','queued','cancel_requested'].includes(data.status);

        document.getElementById('cancelBtn').style.display = isActive ? 'block' : 'none';

        panel.innerHTML = `
          <div class="detail-meta">
            <div class="meta-item"><span class="meta-label">任务 ID</span>${escapeHtml(data.taskId)}</div>
            <div class="meta-item"><span class="meta-label">CLI</span>${escapeHtml(data.cli)}</div>
            <div class="meta-item"><span class="meta-label">状态</span><span class="badge ${escapeHtml(data.status)}">${statusLabel(data.status)}</span></div>
            <div class="meta-item"><span class="meta-label">耗时</span><span id="elapsedTime">${escapeHtml(String(data.elapsed))}s</span></div>
            <div class="meta-item"><span class="meta-label">沙箱</span>${escapeHtml(data.options?.sandbox || 'workspace-write')}</div>
            <div class="meta-item"><span class="meta-label">超时</span>${escapeHtml(String(data.options?.timeout || 600))}s</div>
            <div class="meta-item" style="grid-column:1/3"><span class="meta-label">工作目录</span><span style="font-size:12px;word-break:break-all">${escapeHtml(data.workdir)}</span></div>
            <div class="meta-item"><span class="meta-label">创建</span>${toLocal(data.createdAt)}</div>
            <div class="meta-item"><span class="meta-label">开始</span>${toLocal(data.startedAt)}</div>
            <div class="meta-item"><span class="meta-label">完成</span>${toLocal(data.completedAt)}</div>
            <div class="meta-item"><span class="meta-label">输出行</span>${escapeHtml(String(data.outputLines))}</div>
            ${data.error ? `<div class="meta-item" style="grid-column:1/3"><span class="meta-label">错误</span><span style="color:var(--danger)">${escapeHtml(data.error)}</span></div>` : ''}
          </div>
          <div class="detail-tabs">
            <button class="tab-btn active" onclick="switchTab('result',this)">审查结果</button>
            <button class="tab-btn" onclick="switchTab('logs',this)">实时日志</button>
          </div>
          <div class="detail-content" id="logContent">加载中...</div>
        `;

        // 运行中的任务：启动耗时实时计时器
        if (isActive) {
          let seconds = data.elapsed;
          elapsedTimer = setInterval(() => {
            seconds++;
            const el = document.getElementById('elapsedTime');
            if (el) el.textContent = seconds + 's';
          }, 1000);
        }

        loadResult(id);
      } catch (e) {
        console.error('加载详情失败:', e);
      }
    }

    async function loadResult(id) {
      const res = await fetch(`${API}/tasks/${id}/result`);
      const data = await res.json();
      const el = document.getElementById('logContent');
      if (el) el.textContent = data.result || '(暂无结果)';
    }

    async function loadLogs(id) {
      const res = await fetch(`${API}/tasks/${id}/logs`);
      const data = await res.json();
      const el = document.getElementById('logContent');
      if (el) el.textContent = data.logs || '(暂无日志)';
    }

    function switchTab(tab, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (tab === 'result') loadResult(selectedId);
      else loadLogs(selectedId);
    }

    async function cancelTask() {
      if (!selectedId) return;
      await fetch(`${API}/compat/cancel/${selectedId}`);
    }

    /** UTC 时间字符串 → 本地时间显示 */
    function toLocal(utcStr) {
      if (!utcStr || utcStr === '-') return '-';
      // SQLite datetime('now') 格式: "2026-03-12 04:33:21"，补上 UTC 标识
      const d = new Date(utcStr.replace(' ', 'T') + 'Z');
      if (isNaN(d)) return utcStr;
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 定时刷新列表（补充 WebSocket 可能遗漏的）
    setInterval(async () => {
      try {
        const res = await fetch(`${API}/tasks`);
        const data = await res.json();
        tasks = data.tasks || [];
        renderAll();
      } catch (e) {}
    }, 10000);
  </script>
</body>
</html>
